zammad:
  image: ghcr.io/zammad/zammad
  tag: latest
  port: 3000
  replicas: 1

  # Database configuration
  db:
    host: "" # Will be set by postgresql chart if left empty
    user: zammad
    password: "" # Overridden by postgresql.auth.password if not empty
    name: zammad
    port: 5432

  # Elasticsearch configuration
  elasticsearch:
    host: "" # Will be set by elasticsearch chart if left empty
    port: 9200

  # Volume configuration
  volumes:
    data:
      size: 1Gi
      accessMode: ReadWriteMany
      # storageClass: ""

  # Resource configuration
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2G

extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: "haproxy"
    # Add other annotations as needed
  hosts:
    - host: helpdesk.opendesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: zammad-tls
      hosts:
        - helpdesk.opendesk.example.com

# Embedded PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    username: zammad
    password: ""
    database: zammad
  primary:
    persistence:
      enabled: true
      size: 8Gi

# Embedded Elasticsearch configuration
elasticsearch:
  enabled: true
