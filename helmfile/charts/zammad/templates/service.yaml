apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-zammad
  labels:
    zammad/server: "true"
{{ include "zammad.labels" . | nindent 4 }}
spec:
  selector:
    zammad/server: "true"
{{ include "zammad.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.zammad.port }}
      targetPort: {{ .Values.zammad.port }}
  type: ClusterIP
