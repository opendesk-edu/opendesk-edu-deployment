apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-etherpad
  labels:
    etherpad/server: "true"
{{ include "etherpad.labels" . | nindent 4 }}
spec:
  selector:
    etherpad/server: "true"
{{ include "etherpad.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.etherpad.port }}
      targetPort: {{ .Values.etherpad.port }}
  type: ClusterIP
