suite: test configmap
templates:
  - configmap.yaml
tests:
  - it: should create a ConfigMap with correct values
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: data.GROMMUNIO_TIMEZONE
          value: Europe/Berlin
      - equal:
          path: data.GROMMUNIO_LANGUAGE
          value: English
      - equal:
          path: data.GROMMUNIO_DB_TYPE
          value: mariadb
      - equal:
          path: data.GROMMUNIO_DB_PORT
          value: "3306"
      - equal:
          path: data.GROMMUNIO_CACHE_PORT
          value: "6379"
      - equal:
          path: data.GROMMUNIO_MAIL_DOMAIN
          value: opendesk.example.com
      - equal:
          path: data.GROMMUNIO_ACTIVESYNC_ENABLED
          value: "true"
      - equal:
          path: data.GROMMUNIO_OUTLOOK_MAPI_ENABLED
          value: "true"
      - equal:
          path: data.GROMMUNIO_LOGGING_LEVEL
          value: INFO
      - equal:
          path: data.GROMMUNIO_MONITORING_ENABLED
          value: "true"
  - it: should include LDAP URL when LDAP is enabled
    asserts:
      - equal:
          path: data.GROMMUNIO_LDAP_ENABLED
          value: "true"
      - equal:
          path: data.GROMMUNIO_LDAP_URL
          value: "ldap://openldap:389"
      - equal:
          path: data.GROMMUNIO_LDAP_HOST
          value: openldap
      - equal:
          path: data.GROMMUNIO_LDAP_PORT
          value: "389"
  - it: should not include LDAP settings when LDAP is disabled
    set:
      grommunio.ldap.enabled: false
    asserts:
      - notExists:
          path: data.GROMMUNIO_LDAP_ENABLED
      - notExists:
          path: data.GROMMUNIO_LDAP_URL
  - it: should include OIDC discovery URL when OIDC is enabled
    asserts:
      - equal:
          path: data.GROMMUNIO_AUTH_METHOD
          value: "oidc"
      - equal:
          path: data.GROMMUNIO_OIDC_DISCOVERY_URL
          value: "https://keycloak.opendesk.example.com/realms/opendesk/.well-known/openid-configuration"
  - it: should use SAML auth method when OIDC is disabled and SAML is enabled
    set:
      grommunio.auth.oidc.enabled: false
      grommunio.auth.saml.enabled: true
    asserts:
      - equal:
          path: data.GROMMUNIO_AUTH_METHOD
          value: "saml"
      - notExists:
          path: data.GROMMUNIO_OIDC_DISCOVERY_URL
