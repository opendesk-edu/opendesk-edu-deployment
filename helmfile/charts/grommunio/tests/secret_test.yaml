suite: test secret
templates:
  - secret.yaml
tests:
  - it: should create a Secret with sensitive data
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: metadata.name
          value: RELEASE-NAME-grommunio-secret
  - it: should contain database password when set
    set:
      grommunio.db.password: test-db-password
    asserts:
      - equal:
          path: stringData.GROMMUNIO_DB_PASSWORD
          value: test-db-password
  - it: should contain cache password when set
    set:
      grommunio.cache.password: test-cache-password
    asserts:
      - equal:
          path: stringData.GROMMUNIO_CACHE_PASSWORD
          value: test-cache-password
  - it: should contain OIDC client secret when set
    set:
      grommunio.auth.oidc.clientSecret: test-oidc-secret
    asserts:
      - equal:
          path: stringData.GROMMUNIO_OIDC_CLIENT_SECRET
          value: test-oidc-secret
