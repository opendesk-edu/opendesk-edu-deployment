apiVersion: v1
kind: Service
metadata:
  name: {{ include "grommunio.fullname" . }}
  labels:
{{ include "grommunio.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.grommunio.service.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  type: {{ .Values.grommunio.service.type }}
  ports:
    - port: {{ .Values.grommunio.service.port }}
      targetPort: {{ .Values.grommunio.service.targetPort }}
      protocol: TCP
      name: http
    - port: {{ .Values.grommunio.monitoring.prometheus.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
{{ include "grommunio.selectorLabels" . | nindent 4 }}
