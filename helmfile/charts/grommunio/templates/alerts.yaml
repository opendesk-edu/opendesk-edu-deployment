{{- if .Values.grommunio.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "grommunio.fullname" . }}-alerts
  labels:
{{ include "grommunio.labels" . | nindent 4 }}
    {{- if .Values.grommunio.monitoring.prometheus.alertLabels }}
{{ toYaml .Values.grommunio.monitoring.prometheus.alertLabels | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ include "grommunio.fullname" . }}-alerts
      rules:
        - alert: GrommunioPodNotReady
          expr: |
            kube_pod_status_ready{namespace="{{ .Release.Namespace }}",pod=~"{{ include "grommunio.fullname" . }}.*"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Grommunio pod not ready"
            description: "Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} has been not ready for more than 5 minutes."
        - alert: GrommunioPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}",pod=~"{{ include "grommunio.fullname" . }}.*"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Grommunio pod crash looping"
            description: "Pod {{ "{{ $labels.pod }}" }} in namespace {{ "{{ $labels.namespace }}" }} is crash looping."
        - alert: GrommunioHighErrorRate
          expr: |
            rate(grommunio_http_requests_total{namespace="{{ .Release.Namespace }}",status=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Grommunio high error rate"
            description: "Grommunio instance has high error rate: {{ "{{ $value }}" }} errors/s."
        - alert: GrommunioDatabaseConnectionExhausted
          expr: |
            grommunio_db_connections_active{namespace="{{ .Release.Namespace }}"} / grommunio_db_connections_max{namespace="{{ .Release.Namespace }}"} > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Grommunio database connections nearly exhausted"
            description: "Database connection pool is {{ "{{ $value | humanizePercentage }}" }} full."
{{- end }}
