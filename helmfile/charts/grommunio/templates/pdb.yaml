{{- if .Values.grommunio.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "grommunio.fullname" . }}-pdb
  labels:
{{ include "grommunio.labels" . | nindent 4 }}
spec:
  {{- if .Values.grommunio.pdb.minAvailable }}
  minAvailable: {{ .Values.grommunio.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.grommunio.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.grommunio.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
{{ include "grommunio.selectorLabels" . | nindent 6 }}
{{- end }}
