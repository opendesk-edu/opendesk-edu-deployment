suite: test secret
templates:
  - secret.yaml
tests:
  - it: should create Secret with correct name
    set:
      bigbluebutton.greenlight.databaseUrl: "postgresql://user:pass@localhost/db"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-greenlight-secrets
      - equal:
          path: type
          value: Opaque
  - it: should contain secret-key-base in stringData
    set:
      bigbluebutton.greenlight.databaseUrl: "postgresql://user:pass@localhost/db"
    asserts:
      - exists:
          path: stringData.secret-key-base
  - it: should contain bbb-secret when bigbluebuttonSecret is provided
    set:
      bigbluebutton.greenlight.databaseUrl: "postgresql://user:pass@localhost/db"
      bigbluebutton.greenlight.bigbluebuttonSecret: "my-secret"
    asserts:
      - exists:
          path: stringData.bbb-secret
      - equal:
          path: stringData.bbb-secret
          value: "my-secret"
  - it: should not contain bbb-secret when not provided
    set:
      bigbluebutton.greenlight.databaseUrl: "postgresql://user:pass@localhost/db"
    asserts:
      - notExists:
          path: stringData.bbb-secret
