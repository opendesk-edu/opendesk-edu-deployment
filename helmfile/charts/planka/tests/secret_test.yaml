suite: test secret
templates:
  - secret.yaml
tests:
  - it: should create Secret with correct name
    set:
      planka.defaultPassword: "test-password"
      planka.secretKey: "test-secret-key"
      planka.oidc.clientSecret: "test-oidc-secret"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-planka-secrets
      - equal:
          path: type
          value: Opaque
  - it: should use custom defaultPassword when provided
    set:
      planka.defaultPassword: "custom-password"
      planka.secretKey: "test"
      planka.oidc.clientSecret: "test"
    asserts:
      - equal:
          path: stringData.planka-default-password
          value: "custom-password"
  - it: should use custom secretKey when provided
    set:
      planka.secretKey: "custom-secret-key"
      planka.defaultPassword: "test"
      planka.oidc.clientSecret: "test"
    asserts:
      - equal:
          path: stringData.planka-secret-key
          value: "custom-secret-key"
  - it: should use custom oidcClientSecret when provided
    set:
      planka.oidc.clientSecret: "oidc-secret"
      planka.defaultPassword: "test"
      planka.secretKey: "test"
    asserts:
      - equal:
          path: stringData.planka-oidc-client-secret
          value: "oidc-secret"
