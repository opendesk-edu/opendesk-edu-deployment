suite: Persistence
templates:
  - pvc.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a PersistentVolumeClaim
    asserts:
      - isKind:
          of: PersistentVolumeClaim

  - it: should set the correct storage size
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should set ReadWriteOnce access mode
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
