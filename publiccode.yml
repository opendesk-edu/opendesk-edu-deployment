    genericName: "Digital Workplace für Bildungseinrichtungen"
    longDescription: >
      openDesk Edu erweitert die anpassungsfähige Office- und Kollaborations-Suite openDesk
      um Lernmanagement, Videoconferencing und Cloud-Dateiablage — speziell für Universitäten
      und Forschungseinrichtungen.


      Aufbauend auf openDesk CE bietet openDesk Edu alle vertrauten Büro-Anwendungen
      (E-Mail, Groupware, Chat, Wiki, Projektmanagement) ergänzt durch:


      - **ILIAS** und **Moodle** als Learning-Management-Systeme mit SAML-SSO
      - **BigBlueButton** für Online-Vorlesungen und Meetings
      - **OpenCloud** für selbstgehostete Dateisynchronisierung


      Alle Dienste sind über das bestehende Keycloak-SSO und den openDesk-Portal
      integriert. Die Bereitstellung erfolgt über Helm/Helmfile auf Kubernetes.
    shortDescription: >
