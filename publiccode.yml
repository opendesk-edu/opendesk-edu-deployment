    genericName: "Digital Workplace for Education"
    shortDescription: >
      openDesk CE with integrated educational services for universities.
    longDescription: >
      openDesk Edu extends the adaptable openDesk office and collaboration suite
      with learning management, video conferencing, and cloud file sharing —
      specifically designed for universities and research institutions.


      Built on openDesk CE, openDesk Edu provides all essential office applications
      (email, groupware, chat, wiki, project management) plus:


      - **ILIAS** and **Moodle** as learning management systems with SAML SSO
      - **BigBlueButton** for online lectures and meetings
      - **OpenCloud** for self-hosted file sync and share


      All services integrate with openDesk's existing Keycloak SSO and unified portal.
      Deployment is via Helm/helmfile on Kubernetes.
