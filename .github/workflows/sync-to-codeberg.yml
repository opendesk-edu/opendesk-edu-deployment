name: Sync to Codeberg

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync to Codeberg
        uses: fork-sync/github-sync@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_repo: opendesk-edu/deployment
          target_branch: ${{ github.ref_name }}
          sync_tags: true